<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WRAP — Solana Wrapped</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { background: #050507; margin: 0; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    color: #fff;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(254, 59, 104, 0.08), transparent 60%),
      radial-gradient(ellipse 80% 50% at 80% 100%, rgba(153, 69, 255, 0.08), transparent 60%),
      #050507;
    background-attachment: fixed;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #25252e; border-radius: 5px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="pixel-icons.jsx"></script>
<script type="text/babel" src="cards-data.jsx"></script>
<script type="text/babel" src="seeker-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
function App() {
  // Shared state across the prototype
  const [cardIndex, setCardIndex] = React.useState(0);

  // Each frame is independent (a "screen flow" presentation), but
  // tapping the gallery's thumbs updates the card on Screen 2.
  // For demo, all 4 screens render in parallel side by side.

  return (
    <div style={{ minHeight: '100vh', padding: '60px 40px 100px' }}>
      {/* Header */}
      <header style={{
        maxWidth: 1600, margin: '0 auto 60px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end',
        flexWrap: 'wrap', gap: 24,
      }}>
        <div>
          <div style={{
            fontSize: 14, fontWeight: 600, letterSpacing: '0.32em',
            color: '#6b6b78', textTransform: 'uppercase', marginBottom: 12,
          }}>
            Solana Colosseum &nbsp;·&nbsp; consumer · prototype
          </div>
          <h1 style={{
            fontSize: 96, fontWeight: 900, letterSpacing: '-0.05em', lineHeight: 0.9,
            margin: 0,
            background: 'linear-gradient(95deg, #FE3B68 0%, #FF6B3B 30%, #9945FF 100%)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          }}>WRAP</h1>
          <div style={{
            fontSize: 28, fontWeight: 500, color: '#9b9bab', marginTop: 12,
            letterSpacing: '-0.01em',
          }}>
            Spotify Wrapped for your Solana wallet.
          </div>
        </div>
        <div style={{
          fontSize: 14, color: '#6b6b78', fontWeight: 500, letterSpacing: '0.04em',
          textAlign: 'right', maxWidth: 380,
        }}>
          4 screens · Solana Seeker viewport (1080×2400) · Tap dots & thumbs to interact
        </div>
      </header>

      {/* Screen flow */}
      <div style={{
        display: 'flex', gap: 80, overflowX: 'auto', paddingBottom: 60,
        scrollSnapType: 'x mandatory',
        maxWidth: '100%',
        margin: '0 auto',
        padding: '20px 40px 60px',
        justifyContent: 'flex-start',
      }}>
        <div style={{ scrollSnapAlign: 'center', flexShrink: 0 }}>
          <SeekerFrame label="01 · Onboarding">
            <Screen1_Onboarding onConnect={() => alert('→ Screen 2')} />
          </SeekerFrame>
        </div>
        <div style={{ scrollSnapAlign: 'center', flexShrink: 0 }}>
          <SeekerFrame label="02 · Card Reveal">
            <Screen2_Reveal
              cardIndex={cardIndex}
              setCardIndex={setCardIndex}
              onShare={() => alert('Share to X')}
              onMint={() => alert('→ Screen 3')}
              onBack={() => {}}
            />
          </SeekerFrame>
        </div>
        <div style={{ scrollSnapAlign: 'center', flexShrink: 0 }}>
          <SeekerFrame label="03 · Mint Confirmation">
            <Screen3_Mint
              cardIndex={cardIndex}
              onSolscan={() => alert('Solscan')}
              onShare={() => alert('Share again')}
              onBack={() => {}}
            />
          </SeekerFrame>
        </div>
        <div style={{ scrollSnapAlign: 'center', flexShrink: 0 }}>
          <SeekerFrame label="04 · Card Gallery">
            <Screen4_Gallery
              cardIndex={cardIndex}
              setCardIndex={setCardIndex}
              onPick={(i) => {
                setCardIndex(i);
                // Smooth scroll back to screen 2
                const target = document.querySelectorAll('[data-screen-label]')[1];
                if (target) target.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
              }}
              onBack={() => {}}
            />
          </SeekerFrame>
        </div>
      </div>

      {/* Footer note */}
      <div style={{
        maxWidth: 1600, margin: '60px auto 0',
        padding: '40px 0', borderTop: '1px solid #1a1a22',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 16,
        fontSize: 14, color: '#5a5a68', fontWeight: 500,
      }}>
        <div>WRAP — your wallet has stories.</div>
        <div style={{ letterSpacing: '0.16em', textTransform: 'uppercase' }}>Powered by Solana</div>
      </div>
    </div>
  );
}

// Tag screens for label-aware navigation
const _orig = SeekerFrame;
window.SeekerFrame = function TaggedSeeker(props) {
  return (
    <div data-screen-label={props.label}>
      {_orig(props)}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
